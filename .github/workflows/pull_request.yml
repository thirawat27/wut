name: Pull Request CI

on:
  pull_request:
    branches: ["main"]

jobs:
  build:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message || '', 'ci-skip') }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux
            runs_on: ubuntu-latest
            artifact_suffix: lnx
            binary_path: dist/bin/wut
            bundle_dir: dist/bundle/wut
          - target: macos
            runs_on: macos-latest
            artifact_suffix: osx
            binary_path: dist/bin/wut
            bundle_dir: dist/bundle/wut
          - target: windows-x64
            runs_on: windows-latest
            artifact_suffix: win-x64
            binary_path: dist/bin/wut.exe
            bundle_dir: dist/bundle/wut
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download Go modules
        run: go mod download

      - name: Run unit tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...

      - name: Build binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/bin
          version="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-pr}}"
          commit="${GITHUB_SHA::7}"
          build_time="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          go build -trimpath -ldflags "-s -w -X main.Version=${version} -X main.BuildTime=${build_time} -X main.Commit=${commit}" -o "${{ matrix.binary_path }}" .

      - name: Build binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/bin | Out-Null
          $version = if ($env:GITHUB_HEAD_REF) { $env:GITHUB_HEAD_REF } elseif ($env:GITHUB_REF_NAME) { $env:GITHUB_REF_NAME } else { "pr" }
          $commit = $env:GITHUB_SHA.Substring(0, 7)
          $buildTime = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          go build -trimpath -ldflags "-s -w -X main.Version=$version -X main.BuildTime=$buildTime -X main.Commit=$commit" -o "${{ matrix.binary_path }}" .

      - name: Stage portable bundle (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: bash ./.github/scripts/portable_bundle.sh "${{ matrix.binary_path }}" "${{ matrix.bundle_dir }}"

      - name: Stage portable bundle (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .github/scripts/portable_bundle.ps1 -BinaryPath "${{ matrix.binary_path }}" -OutputDir "${{ matrix.bundle_dir }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: wut_pr_${{ github.sha }}_${{ matrix.artifact_suffix }}
          path: ${{ github.workspace }}/${{ matrix.bundle_dir }}
          if-no-files-found: error
